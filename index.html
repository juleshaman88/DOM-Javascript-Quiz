<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>Javascript Fundamentals Quiz</title>
    <meta
      name="description"
      content="A quiz for the fundamentals of Javascript."
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="quizContainer">
      <h1>JavaScript Fundamentals Quiz</h1>
      <div id="introParagraph"></div>
      <div id="questionContainer"></div>
      <div id="optionsContainer"></div>
      <button id="nextButton">Venture Forth</button>
    </div>
    <div id="scoreContainer" class="hidden">
      <h2>Your Score:</h2>
      <p id="score"></p>
      <button id="restartButton">Restart Quiz</button>
    </div>
    <script src="app.js" async defer></script>
  </body>
</html>
